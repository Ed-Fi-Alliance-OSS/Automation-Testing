name: Bug Report
description: Report a defect or unexpected behavior. *General public should use the Community Hub*.
labels:
  - bug
projects:
  - Ed-Fi-Alliance-OSS/2
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps needed to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if available.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant version(s), platform, and configuration details.
      placeholder: |
        - Version:
        - Platform / OS:
        - Other relevant context:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant log output or attach screenshots. Do not include secrets or personal data.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ☝️ After creating this issue, immediately edit and add a label for the portfolio:
        `data-standard`, `ods-api-platform`, `dms-platform`, `data-mgmt-tools`.
