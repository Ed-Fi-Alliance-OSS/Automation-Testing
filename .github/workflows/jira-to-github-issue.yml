name: Create GitHub Issues from labeled Jira tickets

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: jira-to-github-issue
  cancel-in-progress: false

permissions:
  issues: write

env:
  JIRA_PROJECT_KEY: EDFI
  TRIGGER_LABEL: send-to-gh

jobs:
  jira-to-github:
    runs-on: ubuntu-latest
    steps:
      - name: Query Jira for labeled tickets
        env:
          JIRA_BASE_URL:   ${{ vars.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.CREATE_JIRA_TICKET_USER_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.CREATE_JIRA_TICKET_PAT }}
        run: |
          set -euo pipefail
          JQL="project = ${JIRA_PROJECT_KEY} AND labels = \"${TRIGGER_LABEL}\""
          echo "JQL: $JQL"

          RESPONSE=$(curl --silent --show-error --fail \
            --request POST \
            --url "${JIRA_BASE_URL}/rest/api/3/search/jql" \
            --user "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data "$(jq -n --arg jql "$JQL" \
              '{ jql: $jql, fields: ["summary","description"], maxResults: 100 }')")

          echo "$RESPONSE" | jq '[.issues[] | {
            key: .key,
            summary: .fields.summary,
            description: .fields.description
          }]' > tickets.json

          COUNT=$(jq 'length' tickets.json)
          echo "Found $COUNT labeled ticket(s)."
          jq -r '.[].key' tickets.json

      - name: Install ADF → Markdown converter
        run: npm install adf-to-md@1.2.1 --no-save --no-audit --no-fund --silent

      - name: Mirror tickets to GitHub
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL:   ${{ vars.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.CREATE_JIRA_TICKET_USER_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.CREATE_JIRA_TICKET_PAT }}
          TRIGGER_LABEL:   ${{ env.TRIGGER_LABEL }}
        with:
          script: |
            const fs = require('fs');

            const tickets = JSON.parse(fs.readFileSync('tickets.json', 'utf8'));
            core.info(`Processing ${tickets.length} ticket(s).`);
            if (tickets.length === 0) {
              core.info('No labeled tickets; nothing to do.');
              return;
            }

            const { owner, repo } = context.repo;
            const jiraBase = process.env.JIRA_BASE_URL;
            const jiraAuth = 'Basic ' + Buffer
              .from(`${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`)
              .toString('base64');

            const jira = (path, init = {}) => fetch(`${jiraBase}${path}`, {
              ...init,
              headers: {
                Authorization: jiraAuth,
                Accept: 'application/json',
                'Content-Type': 'application/json',
                ...(init.headers || {}),
              },
            });

            // A ticket is already mirrored if any remote link points at an
            // issue in THIS repo.
            const isAlreadyLinked = (remoteLinks, owner, repo) => {
              const needle = `github.com/${owner}/${repo}/issues/`;
              return remoteLinks.some(l => (l.object?.url || '').includes(needle));
            };

            const { convert } = require('adf-to-md');
            const adfToMarkdown = (adf) => {
              if (!adf || !Array.isArray(adf.content) || adf.content.length === 0) {
                return '';
              }
              try {
                return convert(adf).result ?? '';
              } catch (err) {
                core.warning(`ADF conversion failed: ${err.message}`);
                return '_(description could not be converted — see the linked Jira ticket)_';
              }
            };

            // Resolve the "Jira Support Key" issue-field id once.
            const fieldQuery = await github.graphql(`
              query($owner:String!, $repo:String!) {
                repository(owner:$owner, name:$repo) {
                  issueFields(first:100) {
                    nodes { __typename ... on IssueFieldText { id name } }
                  }
                }
              }`, { owner, repo });
            const supportField = fieldQuery.repository.issueFields.nodes
              .find(f => f.name === 'Jira Support Key');
            if (!supportField) {
              core.setFailed(`"Jira Support Key" field not found. Available: ` +
                fieldQuery.repository.issueFields.nodes.map(f => f.name).join(', '));
              return;
            }
            const supportFieldId = supportField.id;

            const setSupportKey = (issueNodeId, jiraUrl) => github.graphql(`
              mutation($issueId:ID!, $fieldId:ID!, $value:String!) {
                updateIssueFieldValue(input:{
                  issueId:$issueId,
                  issueField:{ fieldId:$fieldId, textValue:$value }
                }) { issue { id } }
              }`, { issueId: issueNodeId, fieldId: supportFieldId, value: jiraUrl });

            const addRemoteLink = (key, issue) => jira(
              `/rest/api/3/issue/${key}/remotelink`,
              { method: 'POST', body: JSON.stringify({
                object: {
                  url: issue.html_url,
                  title: `GitHub Issue #${issue.number}: ${issue.title}`,
                  icon: { url16x16: 'https://github.com/favicon.ico', title: 'GitHub' },
                },
              }) });

            const removeLabel = async (key) => {
              const res = await jira(`/rest/api/3/issue/${key}`, {
                method: 'PUT',
                body: JSON.stringify({
                  update: { labels: [{ remove: process.env.TRIGGER_LABEL }] },
                }),
              });
              if (!res.ok) throw new Error(`label remove ${key} → ${res.status}`);
              core.info(`${key}: removed label "${process.env.TRIGGER_LABEL}"`);
            };

            // Map existing issues by their "Jira Support Key" value (paginated).
            const linkedByJiraUrl = new Map();
            let after = null;
            do {
              const page = await github.graphql(`
                query($owner:String!, $repo:String!, $after:String) {
                  repository(owner:$owner, name:$repo) {
                    issues(first:100, after:$after, states:[OPEN,CLOSED]) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        number title id
                        issueFieldValues(first:50) {
                          nodes {
                            __typename
                            ... on IssueFieldTextValue {
                              value field { ... on IssueFieldText { id } }
                            }
                          }
                        }
                      }
                    }
                  }
                }`, { owner, repo, after });
              const conn = page.repository.issues;
              for (const n of conn.nodes) {
                const v = n.issueFieldValues.nodes
                  .find(fv => fv.field && fv.field.id === supportFieldId);
                if (v && v.value) {
                  linkedByJiraUrl.set(v.value, { number: n.number, nodeId: n.id, title: n.title });
                }
              }
              after = conn.pageInfo.hasNextPage ? conn.pageInfo.endCursor : null;
            } while (after);

            const stats = { created: 0, recovered: 0, skipped: 0, labelRemoved: 0, errors: 0 };
            for (const t of tickets) {
              try {
                const rlRes = await jira(`/rest/api/3/issue/${t.key}/remotelink`);
                if (!rlRes.ok) throw new Error(`remotelink GET ${t.key} → ${rlRes.status}`);
                const remoteLinks = await rlRes.json();

                if (isAlreadyLinked(remoteLinks, owner, repo)) {
                  core.info(`${t.key}: SKIP (already linked)`);
                  stats.skipped++;
                  await removeLabel(t.key);
                  stats.labelRemoved++;
                  continue;
                }
                const jiraUrl = `${jiraBase}/browse/${t.key}`;

                // RECOVERY: an issue for this ticket may already exist (field set)
                // but be missing its remote link from a prior partial run.
                const existing = linkedByJiraUrl.get(jiraUrl);
                if (existing) {
                  core.info(`${t.key}: RECOVER (found issue #${existing.number} by field; repairing link)`);
                  const relink = await addRemoteLink(t.key, {
                    html_url: `https://github.com/${owner}/${repo}/issues/${existing.number}`,
                    number: existing.number,
                    title: existing.title,
                  });
                  if (!relink.ok) throw new Error(`remotelink POST ${t.key} → ${relink.status}`);
                  stats.recovered++;
                  await removeLabel(t.key);
                  stats.labelRemoved++;
                  continue;
                }

                core.info(`${t.key}: CREATE (no existing link)`);

                const body = adfToMarkdown(t.description);

                const created = await github.rest.issues.create({
                  owner, repo, title: t.summary, body,
                });
                core.info(`${t.key}: created issue #${created.data.number}`);

                // Set the field BEFORE the remote link so it can anchor recovery.
                await setSupportKey(created.data.node_id, jiraUrl);
                core.info(`${t.key}: set "Jira Support Key" = ${jiraUrl}`);

                const linkRes = await addRemoteLink(t.key, created.data);
                if (!linkRes.ok) throw new Error(`remotelink POST ${t.key} → ${linkRes.status}`);
                core.info(`${t.key}: added Jira remote link`);
                stats.created++;
                await removeLabel(t.key);
                stats.labelRemoved++;
              } catch (err) {
                stats.errors++;
                core.error(`${t.key}: ${err.message}`);
              }
            }
            core.info(`Summary → created:${stats.created} recovered:${stats.recovered} ` +
              `skipped:${stats.skipped} labelRemoved:${stats.labelRemoved} errors:${stats.errors}`);
            if (stats.errors > 0) core.setFailed(`${stats.errors} ticket(s) failed.`);
